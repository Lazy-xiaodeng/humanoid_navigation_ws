# ==============================================================================
# 文件名：nav2_params_rpp.yaml
#
# 功能说明：
#   人形机器人 Nav2 导航配置文件
#
# 适配机器人特征：
#   1. 最小线速度约 0.15 m/s，低于该速度机器人可能不动。
#   2. 最小角速度约 0.1 rad/s，低于该角速度机器人可能不转。
#   3. 转向时会有 2~3 cm 的轻微位移，不是理想原地自转。
#   4. 后方没有传感器，因此必须禁止倒车恢复行为。
#   5. 雷达安装在胸口，高度约 1.215 m，因此导航代价地图使用 ground 坐标系。
#
# 坐标系：
#   map ──> map_ground
#    │
#    └──> odom ──> camera_init ──> body  ──> base_footprint
#           │
#           └──>odom_ground
#
# 核心策略：
#   控制器：RegulatedPurePursuit，稳定、可控、禁止倒车。
#   规划器：SmacPlannerHybrid + DUBIN，只生成前进路径。
#   恢复行为：只允许 Spin 和 Wait，不允许 BackUp。
# ==============================================================================

# ==============================================================================
# BT Navigator
# 行为树导航器
#
# 作用：
#   Nav2 的任务调度中心，负责执行导航行为树。
#   它会调用 planner_server 规划路径，调用 controller_server 跟踪路径，
#   当失败时执行行为树中定义的恢复逻辑。
# ==============================================================================
bt_navigator:
  ros__parameters:
    use_sim_time: False

    # --------------------------------------------------------------------------
    # 全局坐标系
    #
    # 这里建议使用 map_ground，而不是 map。
    # 原因：
    #   静态地图、全局代价地图、局部代价地图希望都在地面高度 Z=0 上工作。
    #   如果 BT 使用 map，而 costmap 使用 map_ground，会增加 TF 转换复杂度。
    #
    # 调整建议：
    #   如果 map_server 发布的 /map frame_id 是 map_ground，则这里必须用 map_ground。
    #   如果你的地图仍然发布在 map，则需要同步改 map_server.frame_id。
    # --------------------------------------------------------------------------
    global_frame: map_ground

    # --------------------------------------------------------------------------
    # 机器人底盘坐标系
    #
    # base_footprint 通常表示机器人投影到地面的中心点。
    # 对导航来说，比 base_link 更合适，因为 base_link 可能带有高度。
    # --------------------------------------------------------------------------
    robot_base_frame: base_footprint

    # --------------------------------------------------------------------------
    # 里程计坐标系
    #
    # 这里建议使用 odom_ground，与 local_costmap 的 global_frame 保持一致。
    # --------------------------------------------------------------------------
    odom_frame: odom_ground

    # --------------------------------------------------------------------------
    # 自定义行为树 XML
    #
    # 关键：
    #   这里必须换成不包含 BackUp 的自定义行为树。
    #
    # --------------------------------------------------------------------------
    default_bt_xml_filename: "/home/ubuntu/humanoid_ws/src/humanoid_navigation2/config/behavior_tree/navigate_with_stairs.xml"

# ==============================================================================
# Controller Server
# 控制器服务器
#
# 作用：
#   接收 planner_server 规划出来的全局路径，然后实时计算 /cmd_vel 速度指令，
#   让机器人沿路径移动。
#
# 推荐控制器：
#   RegulatedPurePursuitController，简称 RPP。
#
# 为什么这里不用 MPPI：
#   1. MPPI 对参数和算力更敏感，容易因为采样、critic 权重、频率不足导致超时。
#   2. 你的机器人最小速度较高，MPPI 容易输出低于死区的小速度，导致机器人不动。
#   3. 后方无传感器，RPP 的 allow_reversing:false 更直接安全。
#   4. 当前阶段建议先稳定跑通，再考虑 MPPI 优化局部绕障能力。
# ==============================================================================
controller_server:
  ros__parameters:
    use_sim_time: False

    # --------------------------------------------------------------------------
    # 控制频率
    #
    # 作用：
    #   controller_server 每秒计算多少次速度指令。
    #
    # 推荐值：
    #   人形机器人建议 10Hz。
    #
    # 为什么不是 20Hz：
    #   1. 机器人动作不快，20Hz 意义不大。
    #   2. 点云、costmap、TF、规划同时运行时，20Hz 容易掉频。
    #   3. 掉频后会触发 controller loop missed rate，进而增加失败概率。
    #
    # 调整方法：
    #   如果 CPU 很强、系统稳定，可以尝试 15 或 20。
    #   如果日志出现 missed desired rate，降到 8 或 10。
    # --------------------------------------------------------------------------
    controller_frequency: 8.0

    # --------------------------------------------------------------------------
    # TF 容忍时间
    #
    # 作用：
    #   控制器查询 TF 时允许的时间误差。
    #
    # 推荐值：
    #   0.5 ~ 1.0 秒。
    #
    # 注意：
    #   不建议长期设置 3.0。
    #   3.0 虽然能掩盖 TF 延迟问题，但也可能使用过旧位姿，导致控制不准。
    #
    # 调整方法：
    #   如果频繁报 TF extrapolation，可先设 1.0。
    #   如果系统时间同步很好，可设 0.3 ~ 0.5。
    # --------------------------------------------------------------------------
    transform_tolerance: 1.0

    # --------------------------------------------------------------------------
    # 速度死区阈值
    #
    # 作用：
    #   Nav2 输出速度前，会把绝对值小于这些阈值的速度归零。
    #
    # 人形机器人：
    #   最小线速度约 0.15 m/s
    #   最小角速度约 0.15 rad/s
    #
    # 这里略微低于硬件实际死区，避免把接近可执行的速度误杀。
    #
    # 调整方法：
    #   如果机器人收到 0.13 m/s 也完全不动，可以改为 0.15。
    #   如果接近目标时经常速度被归零导致卡住，可以略降到 0.10~0.12。
    # --------------------------------------------------------------------------
    min_x_velocity_threshold: 0.13
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.12

    # --------------------------------------------------------------------------
    # 控制失败容忍度
    #
    # 作用：
    #   控制器短时间失败时，不立刻让整个导航任务失败。
    #
    # 推荐：
    #   0.3 ~ 0.5。
    #
    # 调整方法：
    #   如果控制器偶发失败但机器人还能继续，增大到 0.5。
    #   如果希望失败快速触发恢复，降到 0.2~0.3。
    # --------------------------------------------------------------------------
    failure_tolerance: 0.5

    # --------------------------------------------------------------------------
    # Progress Checker
    # 进度检查器
    #
    # 作用：
    #   判断机器人是否真的在移动。
    #   如果在 movement_time_allowance 时间内，没有移动 required_movement_radius，
    #   就会触发 “Failed to make progress”，然后进入恢复行为。
    #
    # 你之前 MPPI 容易失败/超时，其中一个原因就是进度检查太容易触发。
    # --------------------------------------------------------------------------
    progress_checker_plugin: "progress_checker"
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"

      # ------------------------------------------------------------------------
      # 要求移动的最小距离
      #
      # 推荐：
      #   人形机器人 0.15 ~ 0.30。
      #
      # 这里设 0.15：
      #   因为机器人可能先原地旋转一段时间，再开始前进。
      #   如果设 0.5，原地调整期间容易被误判卡住。
      #
      # 调整方法：
      #   如果机器人明明在慢慢走却经常触发失败，减小到 0.10。
      #   如果希望更严格判断卡住，增大到 0.25~0.30。
      # ------------------------------------------------------------------------
      required_movement_radius: 0.15

      # ------------------------------------------------------------------------
      # 允许无明显位移的最长时间
      #
      # 推荐：
      #   人形机器人建议 15~25 秒。
      #
      # 这里设 20 秒：
      #   给机器人足够时间完成起步、转向、避障等待。
      #
      # 调整方法：
      #   如果恢复行为触发太慢，降到 12~15。
      #   如果经常误触发 Failed to make progress，增大到 25~30。
      # ------------------------------------------------------------------------
      movement_time_allowance: 30.0

    # --------------------------------------------------------------------------
    # Goal Checker
    # 目标到达检查器
    #
    # 作用：
    #   判断机器人是否到达目标点。
    # --------------------------------------------------------------------------
    goal_checker_plugins: ["general_goal_checker"]
    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"

      # ------------------------------------------------------------------------
      # stateful 为 True 表示：
      #   一旦认为位置已经到达，就不会因为轻微抖动又变成未到达。
      # ------------------------------------------------------------------------
      stateful: True

      # ------------------------------------------------------------------------
      # XY 目标容差
      #
      # 推荐：
      #   人形机器人不要设太小。
      #   你的机器人转向会有 2~3 cm 位移，且最低速度较高。
      #
      # 这里设 0.20 m：
      #   比较稳，不会为了最后几厘米反复调整。
      #
      # 调整方法：
      #   如果目标停靠精度不够，改 0.15。
      #   如果终点附近抖动/转圈，改 0.25~0.30。
      # ------------------------------------------------------------------------
      xy_goal_tolerance: 1.0

      # ------------------------------------------------------------------------
      # 目标朝向容差
      #
      # 0.26 rad 约等于 15 度。
      #
      # 推荐：
      #   人形机器人 0.25~0.40。
      #
      # 调整方法：
      #   如果必须朝向很准，改 0.20。
      #   如果终点反复转向失败，改 0.35~0.45。
      # ------------------------------------------------------------------------
      yaw_goal_tolerance: 1.0

    # --------------------------------------------------------------------------
    # 控制器插件列表
    # --------------------------------------------------------------------------
    controller_plugins: ["FollowPath"]

    # ==========================================================================
    # Regulated Pure Pursuit Controller
    # RPP 控制器
    #
    # 特点：
    #   沿全局路径取一个前瞻点，然后计算曲率和速度。
    #   它稳定、计算量小，非常适合先让实机可靠跑起来。
    #
    # 缺点：
    #   局部主动绕障能力弱于 MPPI。
    #   所以全局路径和 costmap 质量要足够好。
    # ==========================================================================
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"

      # ------------------------------------------------------------------------
      # 期望巡航线速度
      #
      # 作用：
      #   正常路径跟踪时希望机器人以这个速度前进。
      #
      # 推荐：
      #   0.25 ~ 0.40。
      #
      # 这里设 0.30：
      #   低于你最大速度 0.50，又明显高于最小速度 0.15。
      #
      # 调整方法：
      #   如果机器人行走稳定，可增大到 0.35。
      #   如果容易晃动、避障不稳，降到 0.25。
      # ------------------------------------------------------------------------
      desired_linear_vel: 0.40

      # ------------------------------------------------------------------------
      # 最大线加速度和减速度
      #
      # 作用：
      #   限制速度变化，避免突然起步/急停。
      #
      # 推荐：
      #   人形机器人 0.3~0.6 m/s²。
      #
      # 调整方法：
      #   起步太猛，降低到 0.25~0.3。
      #   响应太慢，增大到 0.5~0.6。
      # ------------------------------------------------------------------------
      max_linear_accel: 0.6
      max_linear_decel: 0.6

      # ------------------------------------------------------------------------
      # 接近目标时的最小线速度
      #
      # 作用：
      #   RPP 靠近目标会自动减速。
      #   但你的机器人低于 0.15 可能不动，所以这里设置保底速度。
      #
      # 关键：
      #   这个值不能低于机器人物理起步速度。
      #
      # 调整方法：
      #   如果接近目标冲过头，可降到 0.12，同时观察机器人能否动。
      #   如果接近目标卡死，保持 0.15 或升到 0.16。
      # ------------------------------------------------------------------------
      min_approach_linear_velocity: 0.13

      # ------------------------------------------------------------------------
      # 到目标前多远开始减速
      #
      # 作用：
      #   距离目标小于该值后，RPP 开始进入接近目标减速逻辑。
      #
      # 推荐：
      #   0.6 ~ 1.0。
      #
      # 调整方法：
      #   终点冲过头，增大到 1.0。
      #   终点前过早变慢，减小到 0.5。
      # ------------------------------------------------------------------------
      approach_velocity_scaling_dist: 1.2

      # ------------------------------------------------------------------------
      # 是否允许倒车
      #
      # 关键安全参数：
      #   你的机器人后方无传感器，所以必须 false。
      # ------------------------------------------------------------------------
      allow_reversing: false

      # ------------------------------------------------------------------------
      # 前瞻距离
      #
      # 作用：
      #   RPP 会在路径前方找一个“追踪点”。
      #   前瞻距离越大，轨迹越平滑，但贴路径精度下降。
      #   前瞻距离越小，跟踪更精确，但容易抖动。
      #
      # 你的机器人转向有轻微位移，因此不能前瞻太小。
      # ------------------------------------------------------------------------
      lookahead_dist: 0.60
      min_lookahead_dist: 0.55
      max_lookahead_dist: 0.80
      

      # ------------------------------------------------------------------------
      # 速度缩放前瞻距离
      #
      # 作用：
      #   速度快时看远一点，速度慢时看近一点。
      #
      # 推荐：
      #   开启。
      # ------------------------------------------------------------------------
      use_velocity_scaled_lookahead_dist: true

      # ------------------------------------------------------------------------
      # 前瞻时间
      #
      # 作用：
      #   当前速度乘以前瞻时间，得到动态前瞻距离。
      #
      # 调整方法：
      #   路径跟踪抖动，增大到 1.8~2.0。
      #   转弯切角太明显，减小到 1.0~1.2。
      # ------------------------------------------------------------------------
      lookahead_time: 1.5
      

      # 路径插值，防止左右抖动摇摆
      use_interpolation: true


      # ------------------------------------------------------------------------
      # 是否启用原地转向对准路径/目标
      #
      # 关键：
      #   后方无传感器且禁止倒车后，目标在侧后方时，机器人应先转头再走。
      # ------------------------------------------------------------------------
      use_rotate_to_heading: false

      # ------------------------------------------------------------------------
      # 触发原地转向的角度阈值
      #
      # 0.35 rad 约等于 20 度。
      #
      # 原因：
      #   如果阈值太小，机器人走直线时也会频繁停下来转头，导致抽搐。
      #   如果阈值太大，机器人会用大弧线修正，可能贴障碍。
      #
      # 调整方法：
      #   经常停下来转，增大到 0.45。
      #   转弯时切角太严重，减小到 0.25~0.30。
      # ------------------------------------------------------------------------
      rotate_to_heading_min_angle: 0.52
      # ------------------------------------------------------------------------
      # 原地转向角速度
      #
      # 必须高于你的最小角速度 0.15 rad/s。
      #
      # 这里设 0.25：
      #   转得动，又不会太猛。
      #
      # 调整方法：
      #   转向太慢，增大到 0.30。
      #   转向晃动明显，降到 0.18~0.22。
      # ------------------------------------------------------------------------
      rotate_to_heading_angular_vel: 0.6

      # ------------------------------------------------------------------------
      # 最大角加速度
      #
      # 作用：
      #   限制角速度变化。
      #
      # 调整方法：
      #   转向启动太猛，降低到 0.6~0.8。
      #   转向响应慢，增大到 1.2。
      # ------------------------------------------------------------------------
      max_angular_accel: 0.6

      # ------------------------------------------------------------------------
      # 曲率调速
      #
      # 作用：
      #   转急弯时自动降低线速度。
      #
      # 对人形机器人有帮助：
      #   可以降低急转导致的晃动和偏移。
      # ------------------------------------------------------------------------
      use_regulated_linear_velocity_scaling: true

      # ------------------------------------------------------------------------
      # 触发曲率调速的最小半径
      #
      # 路径曲率对应的转弯半径小于该值时，开始减速。
      #
      # 调整方法：
      #   转弯太快，增大到 0.6。
      #   转弯太慢，减小到 0.3。
      # ------------------------------------------------------------------------
      regulated_linear_scaling_min_radius: 0.6

      # ------------------------------------------------------------------------
      # 曲率调速后的最低速度
      #
      # 关键：
      #   不能低于机器人最小有效线速度。
      # ------------------------------------------------------------------------
      regulated_linear_scaling_min_speed: 0.13

      # ------------------------------------------------------------------------
      # 是否启用碰撞检测
      #
      # 作用：
      #   RPP 会沿着即将执行的弧线检查是否可能碰撞。
      #
      # 必须开启。
      # ------------------------------------------------------------------------
      use_collision_detection: true

      # ------------------------------------------------------------------------
      # 碰撞预测时间
      #
      # 不同 Nav2 版本参数名可能不同：
      #
      #   Humble / Iron 常见：
      #     max_allowed_time_to_collision_up_to_carrot
      #
      #   某些版本/示例可能使用：
      #     max_allowed_time_to_collision_up_to_curvature
      #
      # 如果启动时报 unknown parameter 或参数无效，请根据你的 Nav2 版本切换名字。
      # ------------------------------------------------------------------------
      max_allowed_time_to_collision_up_to_carrot: 2.5
      # max_allowed_time_to_collision_up_to_curvature: 1.5

      # ------------------------------------------------------------------------
      # 是否根据代价地图障碍物代价进一步降速
      #
      # 这里关闭。
      #
      # 原因：
      #   你的机器人有最小速度死区。
      #   如果离障碍稍近就被降到 0.05，机器人会卡住不动。
      #
      # 如果后期路径很稳，可以尝试打开，但要保证 min speed 不低于 0.15。
      # ------------------------------------------------------------------------
      use_cost_regulated_linear_velocity_scaling: false

      # ------------------------------------------------------------------------
      # Transform 容忍时间
      # ------------------------------------------------------------------------
      transform_tolerance: 1.0

      # ------------------------------------------------------------------------
      # 路径搜索距离
      #
      # 作用：
      #   控制器在全局路径上查找离机器人最近点时的最大搜索距离。
      #
      # 调整方法：
      #   如果路径很长且定位跳动，增大。
      #   一般 5~10 足够。
      # ------------------------------------------------------------------------
      max_robot_pose_search_dist: 15.0

# ==============================================================================
# Local Costmap
# 局部代价地图
#
# 作用：
#   维护机器人周围一定范围内的障碍物，用于局部避障和控制器碰撞检测。
#
# 推荐：
#   使用 odom_ground 作为坐标系。
# ==============================================================================
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: False

      # ------------------------------------------------------------------------
      # TF 容忍时间
      #
      # 如果点云、odom、TF 时间戳有轻微不同步，可设 1.0。
      # 不建议长期设 3.0，除非你明确知道 TF 延迟较大。
      # ------------------------------------------------------------------------
      transform_tolerance: 1.0

      # ------------------------------------------------------------------------
      # 是否每次发布完整 costmap
      #
      # True：
      #   RViz 显示更稳定，但带宽/CPU 稍高。
      #
      # False：
      #   发布增量，效率高，但调试时有时显示不直观。
      # ------------------------------------------------------------------------
      always_send_full_costmap: True

      # ------------------------------------------------------------------------
      # 更新频率和发布频率
      #
      # 推荐：
      #   人形机器人 5Hz 足够。
      #
      # 如果设 10Hz：
      #   点云+体素层会增加 CPU 压力，可能影响控制器频率。
      # ------------------------------------------------------------------------
      update_frequency: 5.0
      publish_frequency: 5.0

      # ------------------------------------------------------------------------
      # 坐标系
      # ------------------------------------------------------------------------
      global_frame: odom_ground
      robot_base_frame: base_footprint

      # ------------------------------------------------------------------------
      # 滚动窗口
      #
      # True：
      #   局部地图跟随机器人移动。
      # ------------------------------------------------------------------------
      rolling_window: true

      # ------------------------------------------------------------------------
      # 局部地图尺寸
      #
      # 8x8 对室内导航一般够用。
      # 如果机器人速度更快，或希望看更远，可以改 10x10。
      #
      # 注意：
      #   地图越大，计算量越高。
      # ------------------------------------------------------------------------
      width: 12
      height: 12

      # ------------------------------------------------------------------------
      # 地图分辨率
      #
      # 0.05 m/cell 是室内移动机器人常用值。
      # 分辨率越小越精细，但计算量越大。
      # ------------------------------------------------------------------------
      resolution: 0.05

      # ------------------------------------------------------------------------
      # 机器人 footprint
      #
      # 表示机器人在地面上的安全包络。
      #
      # 这里比真实尺寸略放大：
      #   因为后方无传感器，需要更保守。
      #
      # 调整方法：
      #   如果机器人总是离障碍太远，可略减小。
      #   如果容易擦碰，增大 x/y 范围或增大 inflation_radius。
      # ------------------------------------------------------------------------
      footprint:  "[ [0.25, 0.26], [0.25, -0.26], [-0.25, -0.26], [-0.25, 0.26] ]"

      # ------------------------------------------------------------------------
      # 插件顺序
      #
      # static_layer：
      #   引入静态地图中的墙体。
      #
      # voxel_layer：
      #   使用 3D 点云标记/清除障碍物。
      #
      # inflation_layer：
      #   对障碍物进行膨胀，必须放最后。
      # ------------------------------------------------------------------------
      plugins: ["static_layer", "voxel_layer", "inflation_layer"]

      # ------------------------------------------------------------------------
      # 静态地图层
      # ------------------------------------------------------------------------
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: True
        map_subscribe_transient_local: True

      # ------------------------------------------------------------------------
      # 体素层
      #
      # 作用：
      #   将 3D 点云投影/体素化到局部代价地图中。
      #
      # 注意：
      #   /airy_points_filtered 的 data_type 必须和真实话题类型一致。
      #   如果它是 sensor_msgs/msg/PointCloud2，则用 PointCloud2。
      #   如果它是 sensor_msgs/msg/LaserScan，则改成 LaserScan。
      # ------------------------------------------------------------------------
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        transform_tolerance: 1.0

        # ----------------------------------------------------------------------
        # Z 方向体素参数
        #
        # origin_z:
        #   体素网格起始高度。
        #
        # z_resolution:
        #   每层高度。
        #
        # z_voxels:
        #   层数。
        #
        # 当前覆盖高度：
        #   -0.1 到 -0.2 + 0.125*16 = 1.82 m
        # ----------------------------------------------------------------------
        origin_z: -1.0
        z_resolution: 0.15
        z_voxels: 16

        # ----------------------------------------------------------------------
        # 最大障碍物高度
        #
        # 高于这个高度的点不会作为障碍物。
        # 1.7 对室内人形机器人较合理。
        # ----------------------------------------------------------------------
        max_obstacle_height: 1.8

        # ----------------------------------------------------------------------
        # 标记阈值
        #
        # 一个体素内至少多少个点才认为是障碍。
        #
        # 值越大：
        #   抗噪更强，但小障碍可能漏检。
        #
        # 值越小：
        #   更敏感，但更容易把噪点当障碍。
        # ----------------------------------------------------------------------
        mark_threshold: 4

        # ----------------------------------------------------------------------
        # 观测源
        #
        # 这里只保留一个点云源。
        # 不建议一开始就加 periodic_clearing，避免配置复杂导致误清除。
        # 如果后面发现障碍残影明显，再单独加 clearing source。
        # ----------------------------------------------------------------------
        observation_sources: pointcloud clearing_3d

        pointcloud:
          topic: /airy_points_filtered

          # 如果 /airy_points_filtered 实际是 LaserScan，把这里改为 "LaserScan"
          data_type: "PointCloud2"

          # 标记高度范围
          min_obstacle_height: 0.1
          max_obstacle_height: 1.7

          # marking=True：
          #   点云命中的地方标记为障碍。
          marking: True

          # clearing=True：
          # 沿传感器射线清除已经消失的障碍。
          clearing: true

          # 射线追踪范围
          raytrace_min_range: 0.10
          raytrace_max_range: 10.0

          # 障碍物标记范围
          obstacle_min_range: 0.20
          obstacle_max_range: 5.0

          # 观测保留时间
          #
          # 0.0 表示只使用最新观测，不保留历史点。
          # 如果点云短暂丢帧导致障碍闪烁，可设 0.2~0.5。
          observation_persistence: 0.0

        clearing_3d:
          topic: /clearing_cloud_3d     
          max_obstacle_height: 1.7
          min_obstacle_height: 0.05    # ★★★ 最小障碍物高度（3cm，低于此视为地面）★★★
          clearing: True               # 启用清除（射线追踪清除旧障碍物）
          marking: False               # 不启用标记（只清除）
          data_type: "PointCloud2"       # 数据类型（LaserScan 或 PointCloud2）
          raytrace_max_range: 15.0     # 射线追踪最大范围
          raytrace_min_range: 0.1     # 射线追踪最小范围
          obstacle_max_range: 8.0      # 障碍物标记最大范围（局部地图不需要太远）
          obstacle_min_range: 0.50     # 障碍物标记最小范围
          observation_persistence: 0.0 # 观测持续时间（0 = 不保留旧观测）
          min_pixels: 2                # 最小像素数

        # periodic_clearing:
        #   topic: /clearing_scan     
        #   max_obstacle_height: 1.7
        #   min_obstacle_height: 0.03    # ★★★ 最小障碍物高度（3cm，低于此视为地面）★★★
        #   clearing: True               # 启用清除（射线追踪清除旧障碍物）
        #   marking: False               # 不启用标记（只清除）
        #   data_type: "LaserScan"       # 数据类型（LaserScan 或 PointCloud2）
        #   raytrace_max_range: 10.0     # 射线追踪最大范围
        #   raytrace_min_range: 0.05     # 射线追踪最小范围
        #   bstacle_max_range: 15.0     # 障碍物标记最大范围
        #   obstacle_min_range: 0.30     # 障碍物标记最小范围
        #   observation_persistence: 0.0 # 观测持续时间（0 = 不保留旧观测）
        #   min_pixels: 2                # 最小像素数
        #   inf_is_valid: True

      # ------------------------------------------------------------------------
      # 膨胀层
      #
      # 作用：
      #   在障碍物周围生成安全缓冲区。
      #
      # inflation_radius:
      #   膨胀半径。
      #
      # cost_scaling_factor:
      #   代价衰减速度。
      #   越大衰减越快，机器人更敢贴近障碍。
      #   越小衰减越慢，机器人更保守。
      # ------------------------------------------------------------------------
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: True

        # 后方无传感器，建议偏保守。
        inflation_radius: 0.65

        # 代价衰减。
        cost_scaling_factor: 5.0

# ==============================================================================
# Global Costmap
# 全局代价地图
#
# 作用：
#   供全局规划器使用，包含静态地图和较远距离障碍。
# ==============================================================================
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: False

      transform_tolerance: 1.0
      always_send_full_costmap: True

      # ------------------------------------------------------------------------
      # 全局地图更新频率
      #
      # 不需要 10Hz。
      # 1~2Hz 足够。
      # ------------------------------------------------------------------------
      update_frequency: 5.0
      publish_frequency: 5.0

      # ------------------------------------------------------------------------
      # 坐标系
      # ------------------------------------------------------------------------
      global_frame: map_ground
      robot_base_frame: base_footprint

      # ------------------------------------------------------------------------
      # footprint 与 local_costmap 保持一致
      # ------------------------------------------------------------------------
      footprint: "[ [0.25, 0.26], [0.25, -0.26], [-0.25, -0.26], [-0.25, 0.26] ]"

      resolution: 0.05

      # ------------------------------------------------------------------------
      # 是否跟踪未知空间
      #
      # True：
      #   未知区域保留为 unknown。
      #
      # 配合 planner 的 allow_unknown:false，可以避免机器人规划穿越未知区域。
      # ------------------------------------------------------------------------
      track_unknown_space: true

      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      #plugins: ["static_layer", "inflation_layer"]

      # ------------------------------------------------------------------------
      # 静态地图层
      # ------------------------------------------------------------------------
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: True
        map_subscribe_transient_local: True

      # ------------------------------------------------------------------------
      # 全局障碍物层
      #
      # 可选：
      #   如果你的静态地图已经足够稳定，且动态障碍只需要局部处理，
      #   可以关闭 global obstacle_layer，降低全局地图残影风险。
      #
      # 这里保留开启，用于把较远障碍加入全局规划。
      # ------------------------------------------------------------------------
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        transform_tolerance: 1.0

        observation_sources: pointcloud periodic_clearing

        pointcloud:
          topic: /airy_points_filtered

          # 如果 /airy_points_filtered 实际是 LaserScan，把这里改为 "LaserScan"
          data_type: "PointCloud2"

          # 标记高度范围
          min_obstacle_height: 0.1
          max_obstacle_height: 1.8

          # marking=True：
          # 点云命中的地方标记为障碍。
          marking: False

          # clearing=True：
          #   沿传感器射线清除已经消失的障碍。
          clearing: False

          # 射线追踪范围
          raytrace_min_range: 0.10
          raytrace_max_range: 11.0

          # 障碍物标记范围
          obstacle_min_range: 0.50
          obstacle_max_range: 10.0

          # 观测保留时间
          #
          # 0.0 表示只使用最新观测，不保留历史点。
          # 如果点云短暂丢帧导致障碍闪烁，可设 0.2~0.5。
          observation_persistence: 0.0

        periodic_clearing:
          topic: /clearing_scan     
          max_obstacle_height: 1.7
          min_obstacle_height: 0.05    # ★★★ 最小障碍物高度（3cm，低于此视为地面）★★★
          clearing: True               # 启用清除（射线追踪清除旧障碍物）
          marking: False               # 不启用标记（只清除）
          data_type: "LaserScan"       # 数据类型（LaserScan 或 PointCloud2）
          raytrace_max_range: 10.0     # 射线追踪最大范围
          raytrace_min_range: 0.1     # 射线追踪最小范围
          bstacle_max_range: 15.0     # 障碍物标记最大范围
          obstacle_min_range: 0.30     # 障碍物标记最小范围
          observation_persistence: 0.0 # 观测持续时间（0 = 不保留旧观测）
          min_pixels: 2                # 最小像素数
          inf_is_valid: True
      # ------------------------------------------------------------------------
      # 膨胀层
      #
      # 作用：
      #   在障碍物周围生成安全缓冲区。
      #
      # inflation_radius:
      #   膨胀半径。
      #
      # cost_scaling_factor:
      #   代价衰减速度。
      #   越大衰减越快，机器人更敢贴近障碍。
      #   越小衰减越慢，机器人更保守。
      # ------------------------------------------------------------------------
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: True

        # 后方无传感器，建议偏保守。
        inflation_radius: 0.65

        # 代价衰减。
        cost_scaling_factor: 5.0

# ==============================================================================
# Planner Server
# 规划器服务器
#
# 作用：
#   在 global_costmap 上规划从当前位置到目标点的全局路径。
#
# 推荐：
#   SmacPlannerHybrid + DUBIN。
#
# 原因：
#   1. Hybrid planner 会考虑转弯半径，比普通 2D A* 更适合非理想运动学。
#   2. DUBIN 只允许前进，不会生成倒车路径。
#   3. 对后方无传感器的人形机器人更安全。
# ==============================================================================
planner_server:
  ros__parameters:
    use_sim_time: False

    # --------------------------------------------------------------------------
    # 期望规划频率
    # 全局规划不需要 10Hz 或 20Hz。
    # 推荐：
    #   1.0-5.0 Hz。
    # --------------------------------------------------------------------------
    expected_planner_frequency: 2.0

    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_smac_planner::SmacPlannerHybrid"

      # ------------------------------------------------------------------------
      # 是否降采样 costmap
      #
      # false：
      #   使用原始 5cm 分辨率，路径更精细。
      #
      # true：
      #   规划更快，但路径细节变差。
      # ------------------------------------------------------------------------
      downsample_costmap: false
      downsampling_factor: 1

      # ------------------------------------------------------------------------
      # 目标容差
      #
      # 规划器如果不能精确规划到目标点，可接受目标附近 tolerance 范围内的点。
      #
      # 推荐：
      #   与 goal_checker.xy_goal_tolerance 接近或略大。
      # ------------------------------------------------------------------------
      tolerance: 0.6

      # ------------------------------------------------------------------------
      # 是否允许穿越未知区域
      #
      # 对实机安全：
      #   建议 false。
      #
      # 如果探索未知地图，可以改 true。
      # ------------------------------------------------------------------------
      allow_unknown: false

      # ------------------------------------------------------------------------
      # 最大迭代次数和规划时间
      #
      # 如果复杂环境中经常规划失败，可以增大 max_planning_time。
      # 如果希望快速失败触发恢复，可以减小。
      # ------------------------------------------------------------------------
      max_iterations: 1000000          # 最大迭代次数
      max_on_heading_iterations: 2000  # 沿航向的最大迭代次数
      max_planning_time: 8.0           # 最大规划时间 (s)

      # ------------------------------------------------------------------------
      # 运动模型
      #
      # DUBIN：
      #   只允许前进，不允许倒车。
      #
      # REEDS_SHEPP：
      #   允许前进和倒车，不推荐用于你当前后方无传感器场景。
      # ------------------------------------------------------------------------
      motion_model_for_search: "DUBIN"

      # ------------------------------------------------------------------------
      # 最小转弯半径
      #
      # 你的机器人虽然接近可原地转，但转向会有 2~3cm 位移。
      # 这里不建议设得过小。
      #
      # 推荐：
      #   0.15~0.20。
      #
      # 调整方法：
      #   路径弯太急、跟踪抖动：增大到 0.20~0.30。
      #   狭窄空间绕不过去：减小到 0.10。
      # ------------------------------------------------------------------------
      minimum_turning_radius: 0.5

      # ------------------------------------------------------------------------
      # 角度离散数量
      #
      # 72 表示 360/72 = 5 度一个方向。
      #
      # 越大：
      #   路径朝向更细腻，但规划更慢。
      # ------------------------------------------------------------------------
      angle_bin_size: 72

      # ------------------------------------------------------------------------
      # 代价权重
      #
      # reverse_penalty 对 DUBIN 基本无意义，因为 DUBIN 不倒车。
      # 但保留也无妨。
      #
      # cost_penalty 越大，路径越远离障碍。
      # non_straight_penalty 越大，路径越偏好直线。
      # ------------------------------------------------------------------------
      reverse_penalty: 5.0                 # 后退惩罚
      change_penalty: 0.2                 # 方向改变惩罚
      non_straight_penalty: 1.0            # 非直线惩罚
      cost_penalty: 4.0                    # 代价惩罚（靠近障碍物的惩罚）
      retrospective_penalty: 0.025         # 回溯惩罚（惩罚"回头路"）

      # ------------------------------------------------------------------------
      # 查找表参数
      # ------------------------------------------------------------------------
      lookup_table_size: 20.0
      cache_obstacle_heuristic: false

      # ------------------------------------------------------------------------
      # 对 DUBIN 来说，不允许反向扩展。
      # ------------------------------------------------------------------------
      allow_reverse_expansion: false

      # ------------------------------------------------------------------------
      # 是否平滑路径
      # ------------------------------------------------------------------------
      smooth_path: true

      # -------- 平滑器参数 --------
      smoother:
        max_iterations: 1000           # 平滑最大迭代次数
        w_smooth: 0.5                  # 平滑权重
        w_data: 0.2                    # 数据权重
        tolerance: 1.0e-10             # 收敛容差
        do_refinement: True            # 是否进行细化
        refinement_num: 2              # 细化次数

# ==============================================================================
# Behavior Server
# 行为服务器
#
# 作用：
#   执行恢复行为，例如原地旋转、等待。
#
# 关键安全要求：
#   你的机器人后方无传感器，所以不能加载 BackUp 插件。
#
# 注意：
#   Nav2 Humble/Iron/Jazzy 常用参数名是 behavior_plugins。
#   不要使用旧的 recovery_plugins。
# ==============================================================================
behavior_server:
  ros__parameters:
    use_sim_time: False

    # --------------------------------------------------------------------------
    # 行为服务器使用的局部代价地图和 footprint
    # --------------------------------------------------------------------------
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint

    # --------------------------------------------------------------------------
    # 行为执行频率
    # --------------------------------------------------------------------------
    cycle_frequency: 5.0

    # --------------------------------------------------------------------------
    # 只加载 spin 和 wait
    #
    # 不加载 backup。
    # 不加载 drive_on_heading，避免某些行为树调用直线后退/前进恢复时产生风险。
    # --------------------------------------------------------------------------
    behavior_plugins: [ "wait"]

    # --------------------------------------------------------------------------
    # Spin 行为
    #
    # 用于原地旋转，刷新传感器视野，或者重新对准方向。
    # --------------------------------------------------------------------------
    # spin:
    #   plugin: "nav2_behaviors::Spin"

    #   # 模拟前瞻时间：
    #   # 执行旋转前，检查未来 2 秒是否可能碰撞。
    #   simulate_ahead_time: 2.0

    #   # 最大旋转速度，不能超过机器人能力。
    #   max_rotational_vel: 0.3

    #   # 最小旋转速度，必须高于机器人角速度死区。
    #   min_rotational_vel: 0.15

    #   # 角加速度限制。
    #   rotational_acc_lim: 0.25

    # --------------------------------------------------------------------------
    # Wait 行为
    #
    # 用于等待动态障碍物离开，或者给系统一点恢复时间。
    # --------------------------------------------------------------------------
    wait:
      plugin: "nav2_behaviors::Wait"

    # --------------------------------------------------------------------------
    # 行为服务器坐标系
    #
    # 与 local_costmap 保持一致。
    # --------------------------------------------------------------------------
    global_frame: odom_ground
    robot_base_frame: base_footprint
    transform_timeout: 1.0

# ==============================================================================
# Map Server
# 地图服务器
#
# 作用：
#   发布静态地图 /map
# ==============================================================================
map_server:
  ros__parameters:
    use_sim_time: False

    # 地图 yaml 文件路径通常由 launch 传入。
    yaml_filename: ""

    # --------------------------------------------------------------------------
    # 地图坐标系
    #
    # 关键：
    #   如果你的全局 costmap 使用 map_ground，则 /map 的 frame_id 也应该是 map_ground。
    # --------------------------------------------------------------------------
    frame_id: "map_ground"

# ==============================================================================
# Map Saver
# 地图保存器
# ==============================================================================
map_saver:
  ros__parameters:
    use_sim_time: False
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

    # 保存地图时使用的坐标系。
    frame_id: map_ground

# ==============================================================================
# Robot State Publisher
# ==============================================================================
robot_state_publisher:
  ros__parameters:
    use_sim_time: False

# ==============================================================================
# Lifecycle Manager
# 生命周期管理器
#
# 作用：
#   自动 configure 和 activate Nav2 生命周期节点。
#
# 注意：
#   如果你的系统里 map_server 已经由另一个 lifecycle_manager 管理，
#   可以从 node_names 中移除 map_server。
# ==============================================================================
lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: False
    autostart: true

    node_names: [
      'planner_server',
      'controller_server',
      'behavior_server',
      'bt_navigator'
    ]
