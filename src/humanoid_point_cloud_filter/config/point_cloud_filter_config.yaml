# ============================================================
# 点云滤波节点配置文件
# 节点名必须与 C++ 代码中的节点名一致
# ============================================================

point_cloud_filter_node:
  ros__parameters:
    # ===== 话题配置 =====
    input_topic: "/fast_lio/cloud_registered"   # 订阅的原始点云话题，来自 Fast-LIO，必须与 Fast-LIO 实际发布话题一致
    output_elevation_topic: "/airy_points_for_elevation"  # 输出给高程图节点的点云话题， 必须与 elevation_mapping_params.yaml 的 input_cloud_topic 一致
    output_nav_topic: "/airy_points_filtered"   # 输出给 Nav2 代价地图的点云话题，必须与 nav2_params.yaml 中voxel_layer 和 obstacle_layer 的 topic 一致
    
    # ===== 距离过滤 =====
    min_range: 0.6
    # 最小有效距离（米），过滤掉传感器自身遮挡产生的近距离噪点
    # 调整方向：
    #   → 如果机器人身体被误检为障碍，增大此值（如 0.8）
    #   → 如果近处地面漏检，减小此值（如 0.4）

    max_range: 10.0
    # 最大有效距离（米），过滤远距离低质量点
    # 调整方向：
    #   → 室内环境可以减小到 6.0~8.0，减少计算量
    #   → 室外大场景可以增大到 15.0~20.0

    # ===== 高度过滤（Z轴裁剪）=====
    elev_min_z: -0.235
    # 高程图点云的最低高度（米，相对于 base_footprint）
    # 负值表示脚底以下，用于捕捉地面凹陷
    # 调整方向：
    #   → 机器人腿长增加时，需要更负的值（如 -0.4）
    #   → 如果地面被过度捕捉，减小绝对值（如 -0.1）

    elev_max_z: 1.7
    # 高程图点云的最高高度（米）
    # 用于过滤天花板、顶部遮挡物
    # 调整方向：
    #   → 室内低矮空间可以减小到 1.2~1.5
    #   → 需要检测高障碍物时增大

    nav_min_z: 0.1
    # 导航点云的最低高度（米）
    # 过滤地面点，只保留障碍物
    # 调整方向：
    #   → 如果地面被误检为障碍，增大到 0.15~0.2
    #   → 如果门槛等低矮障碍漏检，减小到 0.05

    nav_max_z: 1.7
    # 导航点云的最高高度（米）
    # 过滤头顶以上的点（如天花板、灯具）
    # 调整方向：根据机器人高度设置，通常为机器人高度 × 0.9

    # ===== 机器人自身包络盒过滤（手臂去除）(base_footprint坐标系，x前y左z上，原点脚底)=====
    enable_body_box_filter: true
    arm_box_x_min: -0.10   # 后方边界（m）
    arm_box_x_max:  0.60   # 前方边界（m）
    arm_box_y_min: -0.6   # 右侧边界（m，负值=右）
    arm_box_y_max:  0.60   # 左侧边界（m）
    arm_box_z_min:  0.0   # 下边界，离地高度（m）
    arm_box_z_max:  1.20   # 上边界，离地高度（m）

    # ===== 吊架过滤（LiDAR 支架，body坐标系，x前y左z上，原点LiDAR中心）=====
    # ★★★ 扩大过滤范围，避免转弯时吊架被误检为障碍物
    enable_mount_filter: true
    mount_box_x_min: -0.25   # ★★★ 扩大：支架后方（从-0.15增加到-0.25）
    mount_box_x_max:  0.25   # ★★★ 扩大：支架前方（从0.15增加到0.25）
    mount_box_y_min: -0.25   # ★★★ 扩大：支架右侧（从-0.15增加到-0.25）
    mount_box_y_max:  0.25   # ★★★ 扩大：支架左侧（从0.15增加到0.25）
    mount_box_z_min: -0.15   # ★★★ 扩大：支架下方（从-0.10增加到-0.15）
    mount_box_z_max:  0.10   # ★★★ 扩大：支架上方（从0.05增加到0.10）

    # ===== 体素下采样 =====
    voxel_leaf_size: 0.05
    # 体素格子大小（米），控制点云密度
    # 调整方向：
    #   → 增大（如 0.08~0.1）：减少点数，降低计算量，但细节变差
    #   → 减小（如 0.03）：保留更多细节，但计算量增加
    #   → 建议与高程图分辨率保持一致或略小

    # ===== 统计离群点滤波（SOR）=====
    sor_k: 20
    # 统计时参考的邻近点数量
    # 调整方向：
    #   → 增大（如 30~50）：滤波更稳定，但计算量增加
    #   → 减小（如 10）：计算快，但对孤立点的判断不够准确

    sor_std_ratio: 1.0
    # 静止时的标准差倍数阈值
    # 超过均值 + ratio×标准差 的点会被删除
    # 调整方向：
    #   → 减小（如 0.5~0.8）：滤波更激进，去除更多噪点，但可能误删真实点
    #   → 增大（如 1.5~2.0）：滤波更宽松，保留更多点，但噪点也更多

    sor_std_ratio_moving: 0.8
    # 运动时的标准差倍数阈值（比静止时更严格）
    # 运动时传感器抖动更大，需要更严格的滤波
    # 调整方向：同上，通常比sor_std_ratio 小0.2~0.3

    # ===== 高度连续性检查 =====
    height_diff_threshold: 0.05
    # 静止时高度差阈值（米）
    # 某点与邻近点高度差超过此值则视为噪点
    # 调整方向：
    #   → 减小（如 0.03）：更严格，去除更多孤立点
    #   → 增大（如 0.08~0.1）：允许更大的高度跳变，适合台阶环境

    height_diff_threshold_moving: 0.03
    # 运动时高度差阈值（米，比静止时更严格）
    # 调整方向：同上

    # ===== 密度检查 =====
    density_radius: 0.1
    # 密度检查的搜索半径（米）
    # 调整方向：
    #   → 增大：检查更大范围内的点密度
    #   → 减小：只检查紧邻的点

    min_density_points: 3
    # 静止时最小邻近点数量，低于此值视为孤立噪点
    # 调整方向：
    #   → 增大（如 5）：更严格，去除稀疏区域的点
    #   → 减小（如 2）：保留更多点

    min_density_points_moving: 4
    # 运动时最小邻近点数量（比静止时更严格）

    # ===== 运动检测 =====
    motion_threshold: 0.2
    # 判断机器人是否在运动的位移阈值（米）
    # 连续帧之间位移超过此值认为在运动
    # 调整方向：
    #   → 增大（如 0.3~0.5）：只有快速运动才触发运动模式
    #   → 减小（如 0.1）：缓慢移动也触发运动模式（更保守）

    motion_history_size: 5
    # 运动检测的历史帧数（滑动窗口大小）
    # 调整方向：
    #   → 增大（如 10）：运动状态判断更稳定，但响应变慢
    #   → 减小（如 3）：响应快，但判断可能抖动

    # ===== 滤波开关 =====
    enable_sor: true
    # 是否启用统计离群点滤波
    # 建议始终开启，这是最基础的噪点过滤

    enable_height_continuity: true
    # 是否启用高度连续性检查
    # 对于台阶环境建议开启，但阈值要调大
    # ⚠️ 注意：C++ 代码里默认值是 false，yaml 里设true会覆盖

    enable_density: true
    # 是否启用密度检查
    # 计算量较大，如果 CPU 紧张可以关闭
    # ⚠️ 注意：C++ 代码里默认值是 false，yaml 里设 true 会覆盖

    enable_motion_detection: true
    # 是否启用运动检测（动态调整滤波参数）
    # 建议开启，让机器人运动时自动加强滤波

    # ===== 性能监控 =====
    enable_performance_log: false
    # 是否打印性能统计日志
    # 调试时开启，正式部署可以关闭节省日志开销

    performance_log_interval: 100
    # 每隔多少帧打印一次性能统计
    # 调整方向：减小（如 50）可以更频繁地监控性能

    # ===== 多线程配置 =====
    num_threads: 4
    # 点云滤波使用的线程数（针对16核CPU优化）
    # 0表示使用OpenMP默认线程数
    # 建议设置为CPU核心数的一半到三分之二

    scan_queue_size: 10
    # 点云订阅队列大小
    # 调整方向：
    #   → 减小（如 10）：减少延迟，但可能丢帧
    #   → 增大（如 100）：不丢帧，但延迟增加