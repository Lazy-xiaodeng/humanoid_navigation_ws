metadata:
  version: "2.1"
  description: "人形机器人面部表情指令库"
  category: "facial"

facial_gestures:
  # ==========================================
  # 复合表情 (多部位组合，指令末尾加\n确保硬件识别)
  # ==========================================

  #1.待机状态：嘴部保持关闭，循环执行快速眨眼
  idle:
    - 'delay:0.1'
    - '!normal_start'   # 快速眨眼
    - 'delay:0.1'       # 眨眼指令延迟
   # - '$DGB:1!\n'       # 眼球归中
   # - 'delay:0.1'      # 归中延迟
    - '#DGM:1!\n'       # 闭嘴
    - 'delay:0.1'      # 闭嘴延迟


  #2.惊讶：眨眼一次，睁大眼睛紧盯前方，张大嘴巴
  surprised:
    - 'delay:0.1'
    - '$DGL:3!\n'       # 闭眼
    - 'delay:0.2'       # 闭眼延迟
    - '#DGM:1!\n'       # 闭嘴
    #- 'delay:0.2'       # 闭嘴延迟
    - '$DGB:1!\n'       # 眼球归中
    - 'delay:0.2'       # 眼球复位延迟
    - '$DGL:1!\n'       # 睁眼
    - 'delay:0.2'       # 睁眼渐变延迟
    - '#DGM:5!\n'       # 完全张开嘴
    - 'delay:0.2'       # 张嘴渐变延迟

  #3.思考1：眯眼后眼球左右晃动，眼睛睁大再次眼球左右晃动若有所思，眨一次眼目光直视前方嘴巴微张
  thinking1:
    - 'delay:0.1'
    - '$DGL:2!\n'       # 眯眼
    - 'delay:0.1'       # 眯眼渐变延迟
    - '#DGM:1!\n'       # 闭嘴
    - 'delay:0.1'       # 嘴部闭合延迟
    - '$DGB:4!\n'       # 眼球左移
    - 'delay:0.2'       # 眼球转动延迟（重点）
    - '$DGB:7!\n'       # 眼球右移
    - 'delay:0.25'       # 右移延迟
    - '$DGL:1!\n'       # 睁眼
    - 'delay:0.2'      # 睁眼渐变延迟
    - '$DGB:4!\n'       # 再次左移
    - 'delay:0.3'       # 转动延迟
    - '$DGB:7!\n'       # 再次右移
    - 'delay:0.4'       # 右移延迟
    - '$DGB:1!\n'       # 眼球复位
    - 'delay:0.2'       # 复位延迟
    - '$DGL:3!\n'       # 闭眼
    - 'delay:0.2'       # 闭眼延迟
    - '$DGB:1!\n'       # 眼球复位
    - 'delay:0.1'       # 复位确认延迟
    - '$DGL:1!\n'       # 睁眼
    - 'delay:0.1'      # 睁眼延迟
    - '#DGM:3!\n'       # 嘴巴微张
    - 'delay:0.1'       # 张嘴延迟

  #4.思考2：眼球不断转动若有所思，眨眼一次继续转动眼球，最后目光直视前方
  thinking2:
    - '$DGL:3!\n'       # 闭眼
    - 'delay:0.2'
    - '$DGB:1!\n'      # 居中
    #- 'delay:0.2'
    - 'delay:0.2'
    - '$DGL:1!\n'       # 睁眼
    - 'delay:0.2'
    - '$DGB:2!\n'       # 左1
    - 'delay:0.1'
    - '$DGB:3!\n'       # 左2
    - 'delay:0.1'
    - '$DGB:4!\n'       # 左3
    - 'delay:0.1'
    - '$DGB:20!\n'      # 左极限
    - 'delay:0.1'       # 极限位置延迟
    - '$DGB:13!\n'      # 左下1
    - 'delay:0.1'
    - '$DGB:12!\n'      # 左下2
    - 'delay:0.1'
    - '$DGB:8!\n'       # 下1
    - 'delay:0.1'
    - '$DGB:14!\n'      # 右下1
    - 'delay:0.1'
    - '$DGB:15!\n'      # 右下2
    - 'delay:0.1'
    - '$DGL:3!\n'       # 闭眼
    - 'delay:0.2'
    - '$DGB:1!\n'      # 居中
    - 'delay:0.2'
    - '$DGL:1!\n'       # 睁眼
    - 'delay:0.2'
    - '$DGB:5!\n'       # 右1
    - 'delay:0.1'
    - '$DGB:6!\n'       # 右2
    - 'delay:0.1'
    - '$DGB:7!\n'       # 右3
    - 'delay:0.1'
    - '$DGB:21!\n'      # 右极限
    - 'delay:0.1'       # 极限位置延迟
    - '$DGB:19!\n'      # 右上1
    - 'delay:0.1'
    - '$DGB:18!\n'      # 右上2
    - 'delay:0.1'
    - '$DGB:10!\n'      # 上1
    - 'delay:0.1'
    - '$DGB:16!\n'      # 左上1
    - 'delay:0.1'
    - '$DGB:17!\n'      # 左上2
    - 'delay:0.1'
    - '$DGB:1!\n'       # 归中
    - 'delay:0.1'

  #5.睡眠模式：闭上眼睛和嘴巴
  sleeping:
    - 'delay:0.2'
    - '$DGL:1!\n'       # 睁眼
    - 'delay:0.1'       # 睁眼延迟
    - '#DGM:1!\n'       # 闭嘴
    - 'delay:0.1'      # 闭嘴延迟

  #6.停止：停止一切动作，然后睁着眼闭着嘴，目光直视前方
  stop:
    - 'delay:0.1'
    - '!stop\n'
    - 'delay:0.1'
    - '!stop\n'
    - 'delay:0.1'       # 终止指令延迟
    - '?stop\n'
    - 'delay:0.1'
    - '?stop\n'
    - 'delay:0.1'
    - '$DGL:1!\n'       # 睁眼复位
    - 'delay:0.1'
    - '$DGB:1!\n'       # 眼球复位
    - 'delay:0.1'
    - '#DGM:1!\n'       # 闭嘴复位
    - 'delay:0.1'

  #7.说话：快速眨眼开始说话（循环执行）
  talk:
    - 'delay:0.1'
    - '!normal_start'
    - 'delay:0.1'  # 眨眼指令延迟
    - '?speak_start'
    - 'delay:0.1'      # 嘴部说话指令延迟


  #8.兴奋：睁大眼睛，张大嘴巴，眼球左右晃动后目光直视前方
  excited:
    - 'delay:0.2'       # 闭眼延迟
    - '$DGL:3!\n'       # 闭眼
    - 'delay:0.1'       # 闭眼延迟
    - '$DGB:1!\n'       # 眼球复位
    - 'delay:0.1'       # 睁眼延迟
    - '$DGL:1!\n'       # 正常睁眼
    - 'delay:0.1'       # 睁眼延迟
    - '#DGM:4!\n'       # 完全张嘴（大笑）
    - 'delay:0.1'       # 张嘴渐变延迟
    - '$DGB:4!\n'       # 眼球左移
    - 'delay:0.2'       # 左移延迟
    - '$DGB:7!\n'       # 眼球右移
    - 'delay:0.3'       # 右移延迟
    - '$DGB:4!\n'       # 眼球左移
    - 'delay:0.4'       # 左移延迟
    - '$DGB:7!\n'       # 眼球右移
    - 'delay:0.2'       # 右移延迟
    - '$DGB:1!\n'       # 眼球复位
    - 'delay:0.1'       # 复位延迟

  #9.伤心：闭上眼睛然后眯眼，眼球轻微晃动
  sad:
    - 'delay:0.1'
    - '$DGL:3!\n'       # 闭眼
    - 'delay:0.1'       # 闭眼延迟
    - '#DGM:1!\n'       # 闭嘴（抿嘴）
    #- 'delay:0.2'       # 抿嘴延迟
    #- '$DGB:1!\n'       # 眼球居中
    - 'delay:0.2'
    - '$DGL:2!\n'       # 眯眼（眼眶湿润感）
    - 'delay:0.2'
    - '$DGB:20!\n'       # 左
    - 'delay:0.2'
    - 'delay:0.2'
    - '$DGB:21!\n'       # 右
    - 'delay:0.2'
    - '$DGB:4!\n'       # 左
    - 'delay:0.3'
    - '$DGB:7!\n'       # 右
    - 'delay:0.2'
    - '$DGB:1!\n'       # 眼球居中
    - 'delay:0.1'

  #10.眼球左右转动（优化版）
  eyeball_lr:
    - 'delay:0.2'
    - '$DGB:4!\n'       # 左
    - 'delay:0.1'
    - '$DGB:7!\n'       # 右
    - 'delay:0.1'
    - '$DGB:1!\n'       # 归中
    - 'delay:0.1'
    - '$DGB:4!\n'       # 左
    - 'delay:0.1'
    - '$DGB:7!\n'       # 右
    - 'delay:0.1'
    - '$DGB:1!\n'       # 归中
    - 'delay:0.1'

 #表情动作开发测试
  action_test:
    - 'delay:0.2'
    - '$DGB:4!\n'       # 左
    - 'delay:0.1'       #




  # ==========================================
  # 2. 嘴部单独动作 (Mouth)
  # ==========================================
  mouth_speak_start:
    - '?speak_start'
    #- 'delay:0.1'
  mouth_speak_stop:
    - '?stop'
    #- 'delay:0.1'
  mouth_close:
    - '#DGM:1!'
    #- 'delay:0.1'
  mouth_open_25:
    - '#DGM:2!'
    #- 'delay:0.1'
  mouth_open_50:
    - '#DGM:3!'
    #- 'delay:0.1'
  mouth_open_75:
    - '#DGM:4!'
    #- 'delay:0.1'
  mouth_open_100:
    - '#DGM:5!'
    #- 'delay:0.1'

  # ==========================================
  # 3. 眼睛动效单独控制 (Eye Animation)
  # ==========================================
  eye_fast:
    - '!normal_start'
    #- 'delay:0.1'
  eye_slow:
    - '!silent_start'
    #- 'delay:0.1'
  eye_stop:
    - '!stop'
    #- 'delay:0.1'

  # ==========================================
  # 4. 眼皮/眼睑单独动作 (Eyelid)
  # ==========================================
  eyelid_normal:
    - '$DGL:1!'
    #- 'delay:0.1'
  eyelid_squint:
    - '$DGL:2!'
   # - 'delay:0.1'
  eyelid_close:
    - '$DGL:3!'
   # - 'delay:0.1'
  eyelid_stare:
    - '$DGL:4!'
    #- 'delay:0.1'

  # ==========================================
  # 5. 眼球独立运动位置 (Eyeball)
  # ==========================================
  eyeball_center:
    - '$DGB:1!'
    - 'delay:0.1'
  eyeball_up:
    - '$DGB:9!'
    - 'delay:0.1'
  eyeball_down:
    - '$DGB:11!'
    - 'delay:0.1'
  eyeball_left:
    - '$DGB:20!'
    - 'delay:0.1'
  eyeball_right:
    - '$DGB:21!'
    - 'delay:0.1'