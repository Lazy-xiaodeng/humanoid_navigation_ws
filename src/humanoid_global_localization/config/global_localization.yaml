/**:
  ros__parameters:
    # ==========================================
    # 坐标系
    # ==========================================
    # global_frame_id: 全局地图坐标系
    # odom_frame_id:   里程计坐标系 (发布 map->odom TF 时的子节点)
    #   注意：这里必须设置 "odom"，与现有 TF 树兼容
    global_frame_id: "map"
    odom_frame_id: "odom"

    # ==========================================
    # 地图配置
    # ==========================================
    use_pcd_map: true
    map_path: "/home/ubuntu/humanoid_ws/src/humanoid_navigation2/pcd/hall.pcd"

    # ==========================================
    # 全局搜索参数
    # ==========================================
    # 搜索范围 (在 ROS 标准坐标系 X前 Y左 Z上 中定义)
    # 地图中心大致在 (0,0)，室内大厅约 20m x 15m
    search_x_min: -12.0
    search_x_max:  12.0
    search_y_min: -10.0
    search_y_max:  10.0
    search_step_xy: 1.0       # 网格步长 (米)，越小越精细但搜索越慢
    search_top_k: 5            # 粗匹配后保留多少个候选进入精匹配

    # ==========================================
    # 多分辨率 NDT 参数
    # ==========================================
    # 粗匹配 (全局搜索阶段)
    coarse_ndt_resolution: 3.0    # 3m 网格，收敛范围大，速度快
    coarse_ndt_iterations: 10     # 少量迭代，快速筛选

    # 中匹配 (候选精化阶段)
    medium_ndt_resolution: 1.5
    medium_ndt_iterations: 20

    # 细匹配 (持续跟踪阶段)
    fine_ndt_resolution: 1.0
    fine_ndt_iterations: 35

    # ==========================================
    # 匹配阈值
    # ==========================================
    # 跟踪模式: fitness_score 超过此值丢弃该帧
    score_threshold: 2.0

    # 全局搜索/重定位: 最佳候选的 fitness_score 需要低于此值
    relocalize_score_threshold: 5.0

    # 连续失败 N 帧后触发局部重定位
    consecutive_failures_for_reloc: 10

    # ==========================================
    # 位姿平滑
    # ==========================================
    # 0.0 = 无平滑 (直接使用NDT结果)
    # 0.3 = 适度平滑 (推荐)
    # 0.5 = 强平滑 (机器人运动非常慢时使用)
    smoothing_alpha: 0.3

    # ==========================================
    # 局部重定位
    # ==========================================
    # 跟踪丢失后在最后已知位姿周围的搜索半径 (米)
    reloc_search_radius: 3.0

    # ==========================================
    # 点云滤波
    # ==========================================
    voxel_leaf_size: 0.2     # 体素降采样 (米)
    scan_min_range: 1.0      # 近距离盲区 (米)
    scan_max_range: 100.0    # 最大有效距离 (米)

    # ==========================================
    # 初始位姿 (可选)
    # ==========================================
    # 如果为 true，启动时直接使用下面指定的初始位姿，跳过全局搜索
    # 如果为 false，启动后自动运行全局搜索
    set_initial_pose: false
    initial_pose_x: 0.0
    initial_pose_y: 0.0
    initial_pose_z: 0.0
    initial_pose_qx: 0.0
    initial_pose_qy: 0.0
    initial_pose_qz: 0.0
    initial_pose_qw: 1.0

    # ==========================================
    # 调试
    # ==========================================
    enable_debug: true
