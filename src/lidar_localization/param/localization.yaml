/**:
    ros__parameters:
      # ==========================================
      # 核心算法配置
      # ==========================================
      # 匹配算法选择：
      # "NDT"    : 标准 NDT (CPU 单线程，较慢，不推荐)
      # "NDT_OMP": OpenMP 多线程加速 NDT (推荐，速度快，CPU 占用可控)
      # "GICP"   : 标准 GICP (精度高但极慢，不建议实时使用)
      # "GICP_OMP": OpenMP 加速版 GICP
      registration_method: "NDT_OMP"

      # ==========================================
      # NDT 核心参数 (最重要)
      # ==========================================
      # NDT 网格分辨率 (米)。将地图切分成 1m x 1m x 1m 的立方体，计算每个立方体内的点云概率分布。
      # 调参建议：
      #   - 越小：精度越高，但计算量呈指数级上升，容易卡死。
      #   - 越大：计算越快，但精度下降，可能会出现“滑移”现象。
      #   - 推荐：室内环境 0.5 ~ 1.5；室外大场景 2.0 ~ 5.0。
      ndt_resolution: 1.0

      # NDT 优化步长 (牛顿法步长)。
      # 控制每次迭代变换矩阵更新的幅度。通常不需要修改，默认 0.1 即可。
      ndt_step_size: 0.1

      # NDT 最大迭代次数。
      # 匹配算法尝试匹配的最大次数。
      # 调参建议：如果经常报 "didn't converge"，可以尝试增加到 50。
      ndt_max_iterations: 35

      # NDT 线程数。
      # 用于 NDT_OMP 的并行加速。
      # 调参建议：设置为你的 CPU 核心数。如果设为 0，则自动使用所有核心。
      ndt_num_threads: 8

      # ==========================================
      # 匹配阈值与过滤
      # ==========================================
      # 匹配得分阈值 (Score Threshold)。
      # NDT 匹配后的“吻合度”得分。分数越低表示匹配越完美。
      # 调参建议：
      #   - 一般设置在 1.0 ~ 3.0 之间。
      #   - 如果定位频繁丢失或跳变，适当调大此值（放宽标准）。
      #   - 如果定位漂移严重，适当调小此值（严格要求）。
      score_threshold: 2.0

      # 变换收敛阈值 (Transform Epsilon)。
      # 当两次迭代之间的位姿变化小于此值时，认为匹配收敛，停止迭代。
      # 单位：米。
      transform_epsilon: 0.01

      # 点云降采样体素大小 (米)。
      # 在匹配前，先将点云网格化以减少点数。
      # 调参建议：
      #   - 必须小于 ndt_resolution，通常设为 ndt_resolution 的 1/5 ~ 1/2。
      #   - 例如 ndt_resolution=1.0，这里设为 0.2。
      voxel_leaf_size: 0.2

      # 扫描范围过滤 (米)。
      # 只使用距离机器人 scan_min_range 到 scan_max_range 之间的点云进行匹配。
      # 调参建议：
      #   - scan_min_range: 过滤掉机器人自身的遮挡点（如车身反射）。
      #   - scan_max_range: 过滤掉太远不可靠的噪点。
      scan_max_range: 100.0
      scan_min_range: 1.0

      # ==========================================
      # 坐标系设置 (必须与你的 TF 树匹配)
      # ==========================================
      global_frame_id: "map"    # 全局地图坐标系（通常固定为 map）
      odom_frame_id: "odom"     # 里程计坐标系（发布 map -> odom 变换时的中间节点）
      
      # ★★★ 关键参数：base_frame_id ★★★
      # 这决定了 NDT 节点发布的 TF 变换的终点（子节点）。
      # 在本系统中，NDT 负责发布 map -> odom 的变换。
      # 因此这里必须设为 "odom"！
      # (不要设为 base_footprint，否则会和 Fast-LIO 发布的变换冲突)
      base_frame_id: "odom"

      # ==========================================
      # 地图与初始位姿
      # ==========================================
      use_pcd_map: true         # 是否启动时加载本地 PCD 地图文件
      map_path: "/home/ubuntu/humanoid_ws/src/humanoid_navigation2/pcd/hall.pcd"              # PCD 地图路径（在启动命令中通过参数覆盖）

      # 是否启动时自动设置初始位姿（用于重定位）。
      # 如果为 true，机器人启动时会假设自己在 initial_pose_x/y/z 的位置。
      # ★★★ 关键修复：根据PCD点云密度分析，使用密度最高点作为初始位置 ★★★
      # 密度最高点: (1.0, 1.0)，有18296个点，NDT匹配效果最好
      set_initial_pose: true
      initial_pose_x: 1.0       # ★ 使用点云密度最高点的X坐标
      initial_pose_y: 1.0       # ★ 使用点云密度最高点的Y坐标
      initial_pose_z: 0.0       # ★ 地面高度
      initial_pose_qx: 0.0      # 初始四元数 X
      initial_pose_qy: 0.0      # 初始四元数 Y
      initial_pose_qz: 0.0      # 初始四元数 Z
      initial_pose_qw: 1.0      # 初始四元数 W（无旋转）

      # ==========================================
      # 其他传感器融合 (目前建议关闭)
      # ==========================================
      use_odom: false           # 是否使用里程计预测（目前只用激光匹配，无需开启）
      use_imu: false            # 是否使用 IMU 去畸变（如果雷达转速慢，无需开启）
      enable_debug: true        # 是否在终端打印调试信息（匹配时间、得分等）

